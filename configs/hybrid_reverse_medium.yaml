# Hybrid curriculum with REVERSED stage ordering.
#
# The original schedule asserts "easy first, hard later" — uniform/span
# early, germline/interface late. The paper explicitly notes this
# ordering is hypothesized but not tested. This variant reverses the
# order so "hard first, easy later" — start with germline + interface
# (specialized residues), end with uniform + span (general syntax).
#
# If reverse beats easy-first on downstream metrics, that flips the
# curriculum-design narrative. If it loses, it confirms the original
# ordering hypothesis with a real ablation behind it.
seed: 42

data:
  processed_path: "data/processed/oas_vh_500k.jsonl"
  max_length: 160
  min_length: 80
  train_split: 0.9
  valid_amino_acids: "ACDEFGHIKLMNPQRSTVWY"
  coords_path: "data/structures/oas_vh_500k_igfold.pt"
  paratope_path: "data/structures/oas_vh_500k_paratope.pt"
  germline_path: "data/structures/oas_vh_500k_germline.pt"

masking:
  strategy: "hybrid"
  mask_prob: 0.15
  mask_token_ratio: 0.8
  random_token_ratio: 0.1
  params:
    sub_strategies: ["uniform", "cdr", "span", "structure", "interface", "germline"]
    policy_weights: [0.05, 0.10, 0.05, 0.15, 0.30, 0.35]
    sub_strategy_params:
      cdr:
        cdr3_weight: 6.0
      span:
        geometric_p: 0.2
        max_span_length: 10
      structure:
        k_neighbors: 5
        min_seq_separation: 4
      interface:
        paratope_weight: 6.0
      germline:
        mutated_weight: 6.0
    # Mirror image of hybrid_stretched_medium's schedule.
    curriculum:
      - step: 0
        weights: [0.05, 0.10, 0.05, 0.15, 0.30, 0.35]
      - step: 35000
        weights: [0.05, 0.15, 0.05, 0.15, 0.30, 0.30]
      - step: 75000
        weights: [0.10, 0.30, 0.10, 0.10, 0.30, 0.10]
      - step: 105000
        weights: [0.50, 0.05, 0.40, 0.00, 0.05, 0.00]

model:
  model_name: "alchemab/antiberta2"
  from_pretrained: false
  model_size: "medium"

training:
  output_dir: "models/checkpoints/hybrid_reverse_medium"
  batch_size: 32
  learning_rate: 5.0e-5
  num_epochs: 20
  max_steps: 125000
  warmup_steps: 6250
  weight_decay: 0.01
  logging_steps: 100
  save_steps: 2000
  eval_steps: 5000
  fp16: true
  dataloader_num_workers: 4
  gradient_accumulation_steps: 2
  early_stopping_patience: 0
