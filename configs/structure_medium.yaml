seed: 42

data:
  processed_path: "data/processed/oas_vh_500k.jsonl"
  max_length: 160
  min_length: 80
  train_split: 0.9
  valid_amino_acids: "ACDEFGHIKLMNPQRSTVWY"
  coords_path: "data/structures/oas_vh_500k_igfold.pt"

masking:
  strategy: "structure"
  mask_prob: 0.15
  mask_token_ratio: 0.8
  random_token_ratio: 0.1
  params:
    k_neighbors: 5

model:
  model_name: "alchemab/antiberta2"
  from_pretrained: false
  model_size: "medium"

training:
  output_dir: "models/checkpoints/structure_medium"
  batch_size: 32
  learning_rate: 5.0e-5
  num_epochs: 20
  max_steps: 125000  # equal-step comparison across strategies
  warmup_steps: 6250  # 5% of 125k max_steps
  weight_decay: 0.01
  logging_steps: 100
  save_steps: 2000
  eval_steps: 5000
  fp16: true
  dataloader_num_workers: 4
  gradient_accumulation_steps: 2
  early_stopping_patience: 0  # disabled for fair equal-step comparison
