# Experiment registry: maps experiment names to training configs and checkpoints.
# Used by scripts/run_all_evaluations.py and scripts/generate_report.py.

experiments:
  uniform_medium:
    config: configs/medium.yaml
    checkpoint: models/checkpoints/uniform_medium/final
  cdr_medium:
    config: configs/cdr_medium.yaml
    checkpoint: models/checkpoints/cdr_medium/final
  span_medium:
    config: configs/span_medium.yaml
    checkpoint: models/checkpoints/span_medium/final
  structure_medium:
    config: configs/structure_medium.yaml
    checkpoint: models/checkpoints/structure_medium/final
  interface_medium:
    config: configs/interface_medium.yaml
    checkpoint: models/checkpoints/interface_medium/final
  germline_medium:
    config: configs/germline_medium.yaml
    checkpoint: models/checkpoints/germline_medium/final
  multispecific_medium:
    config: configs/multispecific_medium.yaml
    checkpoint: models/checkpoints/multispecific_medium/final
  hybrid_curriculum_medium:
    config: configs/hybrid_curriculum_medium.yaml
    checkpoint: models/checkpoints/hybrid_curriculum_medium/final
  hybrid_paired_medium:
    config: configs/hybrid_paired_medium.yaml
    checkpoint: models/checkpoints/hybrid_paired_medium/final
  # Post-paper variants exploring structure-prior and curriculum optimizations.
  structure_longrange_medium:
    config: configs/structure_longrange_medium.yaml
    checkpoint: models/checkpoints/structure_longrange_medium/final
  intersection_medium:
    config: configs/intersection_medium.yaml
    checkpoint: models/checkpoints/intersection_medium/final
  hybrid_stretched_medium:
    config: configs/hybrid_stretched_medium.yaml
    checkpoint: models/checkpoints/hybrid_stretched_medium/final
  hybrid_reverse_medium:
    config: configs/hybrid_reverse_medium.yaml
    checkpoint: models/checkpoints/hybrid_reverse_medium/final
  hybrid_warmstart_medium:
    config: configs/hybrid_warmstart_medium.yaml
    checkpoint: models/checkpoints/hybrid_warmstart_medium/final
  hybrid_intersection_medium:
    config: configs/hybrid_intersection_medium.yaml
    checkpoint: models/checkpoints/hybrid_intersection_medium/final
  hybrid_perbatch_medium:
    config: configs/hybrid_perbatch_medium.yaml
    checkpoint: models/checkpoints/hybrid_perbatch_medium/final
  hybrid_weighted_medium:
    config: configs/hybrid_weighted_medium.yaml
    checkpoint: models/checkpoints/hybrid_weighted_medium/final
  hybrid_adaptive_medium:
    config: configs/hybrid_adaptive_medium.yaml
    checkpoint: models/checkpoints/hybrid_adaptive_medium/final

# Downstream task configs applied to every experiment checkpoint.
downstream_tasks:
  - configs/downstream/paratope_probe.yaml
  - configs/downstream/developability_probe.yaml
  - configs/downstream/contact_map_probe.yaml
  - configs/downstream/structure_probe_probe.yaml
