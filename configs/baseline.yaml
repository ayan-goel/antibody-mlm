seed: 42

data:
  processed_path: "data/processed/oas_vh_tiny.jsonl"
  max_length: 160
  min_length: 80
  train_split: 0.9
  valid_amino_acids: "ACDEFGHIKLMNPQRSTVWY"

masking:
  strategy: "uniform"
  mask_prob: 0.15
  mask_token_ratio: 0.8
  random_token_ratio: 0.1

model:
  model_name: "alchemab/antiberta2"
  from_pretrained: false
  model_size: "small"

training:
  output_dir: "models/checkpoints/uniform_baseline"
  batch_size: 32
  learning_rate: 1.0e-4
  num_epochs: 3
  warmup_steps: 100
  weight_decay: 0.01
  logging_steps: 50
  save_steps: 500
  eval_steps: 250
  fp16: true
  dataloader_num_workers: 4
  gradient_accumulation_steps: 1
