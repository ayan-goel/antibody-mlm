seed: 42

data:
  processed_path: "data/processed/oas_paired_500k.jsonl"
  max_length: 384
  min_length: 80
  train_split: 0.9
  valid_amino_acids: "ACDEFGHIKLMNPQRSTVWY"
  paratope_path: "data/structures/oas_paired_500k_paratope.pt"
  interface_path: "data/structures/oas_paired_500k_interface.pt"
  germline_path: "data/structures/oas_paired_500k_germline.pt"
  paired: true
  bispecific: false

masking:
  strategy: "hybrid"
  mask_prob: 0.15
  mask_token_ratio: 0.8
  random_token_ratio: 0.1
  params:
    sub_strategies: ["uniform", "span", "interface", "germline", "multispecific"]
    policy_weights: [0.10, 0.15, 0.20, 0.20, 0.35]
    sub_strategy_params:
      span:
        geometric_p: 0.2
        max_span_length: 10
      interface:
        paratope_weight: 6.0
      germline:
        mutated_weight: 6.0
      multispecific:
        paratope_weight: 6.0
        shared_chain_boost: 3.0
        interface_weight: 6.0
        non_interface_weight: 1.0
        policy_weights: [1.0, 1.0, 1.0]

model:
  model_name: "alchemab/antiberta2"
  from_pretrained: false
  model_size: "medium"

training:
  output_dir: "models/checkpoints/hybrid_paired_medium"
  batch_size: 16
  learning_rate: 5.0e-5
  num_epochs: 20
  warmup_steps: 1000
  weight_decay: 0.01
  logging_steps: 100
  save_steps: 2000
  eval_steps: 1000
  fp16: true
  dataloader_num_workers: 4
  gradient_accumulation_steps: 4
  early_stopping_patience: 5
